#############
### INPUT ###
#############

input {
  kb_layout = br,us
    kb_variant =
    kb_model =
    kb_options = grp:alt_shift_toggle
    kb_rules =

    follow_mouse = 1

    accel_profile = flat
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
      natural_scroll = true
    }
}

gesture = 3, horizontal, workspace

device {
  name = epic-mouse-v1
    sensitivity = -0.5
}
