##################
### APPEARANCE ###
##################

general {
  gaps_in = 0
  gaps_out = 0
  border_size = 2

  col.active_border = rgba(8a8f98aa)
  col.inactive_border = rgba(30303055)

  layout = dwindle
}

decoration {
  rounding = 0

  active_opacity = 0.96
  inactive_opacity = 0.92

  shadow {
    enabled = true
    range = 4
    render_power = 3
    color = rgba(1a1a1aee)
  }

  blur {
    enabled = true
    size = 3
    passes = 1
    vibrancy = 0.1696
  }

  dim_inactive = true
  dim_strength = 0.1
}

animations {
  enabled = yes

  bezier = easeOutQuint,   0.23, 1,    0.32, 1
  bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
  bezier = linear,         0,    0,    1,    1
  bezier = almostLinear,   0.5,  0.5,  0.75, 1
  bezier = quick,          0.15, 0,    0.1,  1

  animation = global,     1, 0.9, default
  animation = border,     1, 0.7, easeOutQuint
  animation = windows,    1, 0.8, easeOutQuint
  animation = fade,       1, 0.9, quick
  animation = workspaces, 1, 0.9, almostLinear, fade
}

dwindle {
  pseudotile = false
  preserve_split = true
}

misc {
  force_default_wallpaper = -1
  disable_hyprland_logo = false
}

